name: Android Release

on:
push:
branches:
- main

permissions:
contents: write

env:
FLUTTER_VERSION: "3.41.9"

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Java 17
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 17

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: ${{ env.FLUTTER_VERSION }}
      cache: true

  - name: Flutter Doctor
    run: flutter doctor -v

  - name: Flutter Version
    run: flutter --version

  - name: Get Dependencies
    run: flutter pub get

  - name: Extract Version
    id: version
    shell: bash
    run: |
      VERSION_LINE=$(grep '^version:' pubspec.yaml | awk '{print $2}')
      VERSION_NAME=$(echo "$VERSION_LINE" | cut -d+ -f1)
      BUILD_NUMBER=$(echo "$VERSION_LINE" | cut -d+ -f2)

      echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
      echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

  - name: Build Release APK
    run: |
      flutter build apk \
        --release \
        --build-name=${{ steps.version.outputs.version_name }} \
        --build-number=${{ steps.version.outputs.build_number }}

  - name: Prepare Release Artifact
    run: |
      mkdir -p release

      cp build/app/outputs/flutter-apk/app-release.apk \
        release/cheque-app-${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.build_number }}.apk

  - name: Create GitHub Release
    uses: softprops/action-gh-release@v2
    with:
      tag_name: v${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.build_number }}
      name: Release v${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.build_number }}
      generate_release_notes: true
      files: release/*.apk
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
