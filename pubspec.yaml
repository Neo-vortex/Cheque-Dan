name: cheque_app
description: مدیریت چک‌های صیادی - Persian Sayyadi Cheque Manager
publish_to: 'none'
version: 1.1.2+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter_localizations:
    sdk: flutter
  flutter:
    sdk: flutter


  # Contacts
  flutter_contacts: ^1.1.9+2

  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Local database
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.8.3
  
  # Local notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  
  # Date & Persian calendar
  shamsi_date: ^1.1.0
  intl: ^0.20.2
  
  # UI
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2
  flutter_slidable: ^3.1.0
  
  # Utilities
  uuid: ^4.3.3
  shared_preferences: ^2.2.2

  # Image & scanning
  image_picker: ^1.1.2
  flutter_doc_scanner: ^0.0.9
  mobile_scanner: ^5.2.3
  provider: ^6.1.2
  
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^9.1.5
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Regular.ttf
        - asset: assets/fonts/Vazirmatn-Medium.ttf
          weight: 500
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700
  assets:
    - assets/fonts/


